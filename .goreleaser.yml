version: 2

project_name: terraform-provider-velia

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: .
    binary: '{{ .ProjectName }}_v{{ .Version }}'
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - terraform-registry-manifest.json

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'

signs:
  - artifacts: checksum

release:
  github:
    owner: IbiliAze
    name: terraform-provider-velia

changelog:
  disable: true
